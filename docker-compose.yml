services:
  source:
    image: mysql:8.0
    container_name: source
    hostname: source
    environment:
      MYSQL_ROOT_PASSWORD: root
    command:
      [
        "--server-id=1",
        "--log-bin=mysql-bin",
        "--binlog-format=ROW",
        "--gtid-mode=ON",
        "--enforce-gtid-consistency=ON"
      ]
    networks: [mybridge]

  replica1:
    image: mysql:8.0
    container_name: replica1
    hostname: replica1
    environment:
      MYSQL_ROOT_PASSWORD: root
    command:
      [
        "--server-id=2",
        "--relay-log=relay-bin",
        "--log-bin=mysql-bin",
        "--gtid-mode=ON",
        "--enforce-gtid-consistency=ON",
      ]
    depends_on: [source]
    networks: [mybridge]

  replica2:
    image: mysql:8.0
    container_name: replica2
    hostname: replica2
    environment:
      MYSQL_ROOT_PASSWORD: root
    command:
      [
        "--server-id=3",
        "--relay-log=relay-bin",
        "--log-bin=mysql-bin",
        "--gtid-mode=ON",
        "--enforce-gtid-consistency=ON",
      ]
    depends_on: [source]
    networks: [mybridge]

  orchestrator:
    image: openarkcode/orchestrator:latest
    container_name: orchestrator
    hostname: orchestrator
    ports:
      - "3000:3000"
    depends_on: [source]
    networks: [mybridge]

networks:
  mybridge:
    name: mybridge
    driver: bridge